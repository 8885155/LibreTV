<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>网站已更换新地址</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:#0b1220;
font-family:system-ui, -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif;
color:#fff;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}
.box{
max-width:420px;
width:100%;
background:#121a29;
border-radius:20px;
padding:40px 30px;
text-align:center;
border:1px solid #2563eb33;
box-shadow:0 0 30px #2563eb15;
}
h1{
font-size:26px;
margin-bottom:12px;
color:#fff;
}
.desc{
color:#94a3b8;
font-size:15px;
line-height:1.6;
margin-bottom:30px;
}
.url{
background:#1e293b;
border:1px solid #2563eb55;
padding:14px 20px;
border-radius:12px;
font-size:18px;
font-weight:bold;
color:#3b82f6;
margin:20px 0;
word-break:break-all;
}
.btn{
display:inline-block;
background:#2563eb;
color:#fff;
padding:12px 30px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
margin-top:10px;
transition:.2s;
}
.btn:hover{
background:#3b82f6;
}
.tip{
margin-top:20px;
font-size:12px;
color:#64748b;
line-height:1.5;
}
</style>
</head>
<body>
<div class="box">
<h1>🚨 网站已更换新域名</h1>
<p class="desc">
原站点已停用，为避免丢失，请收藏保存最新官方地址
</p>
<div class="url" id="newUrl">
tv.888333.xyz
</div>
<a href="https://tv.888333.xyz" class="btn">进入新网站</a>
<p class="tip">
• 永久域名，请收藏不迷路<br>
• 每日更新，高清稳定
</p>
</div>
</body>
</html>
